<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toggle Settings</title>
<style>
  body {
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .settings {
    background: #fff;
    padding: 20px 30px;
    border-radius: 8px;
    font-family: sans-serif;
  }
  .option {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 10px 0;
  }
  .switch {
    width: 45px;
    height: 24px;
    background: #ccc;
    border-radius: 24px;
    position: relative;
    cursor: pointer;
    transition: 0.3s;
  }
  .switch::before {
    content: "";
    position: absolute;
    top: 2px;
    left: 2px;
    width: 20px;
    height: 20px;
    background: #fff;
    border-radius: 50%;
    transition: 0.3s;
  }
  .active {
    background: teal;
  }
  .active::before {
    left: 23px;
  }
</style>
</head>
<body>

<div class="settings">
  <div class="option"><span>Dark Mode</span><div class="switch active" id="darkMode"></div></div>
  <div class="option"><span>Sound Effect</span><div class="switch" id="sound"></div></div>
  <div class="option"><span>Notifications</span><div class="switch active" id="notify"></div></div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
  $(".switch").click(function(){
    $(this).toggleClass("active");
  });
</script>

</body>
</html>
